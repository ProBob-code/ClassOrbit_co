name: Worker CI

# Tests + typecheck run on every worker change (push or PR). The worker only
# deploys after tests pass, and only on a push to main — never from a PR.

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-worker.yml'
  pull_request:
    paths:
      - 'worker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

concurrency:
  group: worker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck worker
        run: pnpm --filter classorbit-api typecheck
      - name: Test worker
        run: pnpm --filter classorbit-api test

  deploy:
    needs: test
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy worker to Cloudflare
        working-directory: worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
