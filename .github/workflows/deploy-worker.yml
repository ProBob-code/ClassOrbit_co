name: Deploy Worker

# The Cloudflare *Pages* (frontend) build deploys automatically on push.
# The *Worker* (worker/) does NOT — it used to require a manual `wrangler deploy`,
# which is how the frontend and backend kept drifting (broken payment/admin).
# This workflow ships the worker whenever its code changes on main.

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy worker to Cloudflare
        working-directory: worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
