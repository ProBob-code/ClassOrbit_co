name = "classorbit-api"
main = "src/index.ts"
account_id = "7d520ea32c454956ef6e5d6f5a35e5f0"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "classorbit.co/api/*", zone_name = "classorbit.co" },
  { pattern = "www.classorbit.co/api/*", zone_name = "classorbit.co" }
]

[vars]
ADMIN_EMAILS = "probob.in.git@gmail.com,bobinjacob46@gmail.com"
# Where monitoring/alert emails go. The Resend API key is a secret:
#   wrangler secret put ALERTS_RESEND_API_KEY
ALERT_EMAIL = "probob.in.git@gmail.com"

[[d1_databases]]
binding = "DB"
database_name = "classorbit-db"
database_id = "f2885e0a-53d0-4a1f-ad38-b50cd89b4948"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "classorbit-images"

# Capture logs/traces so failures are visible in the dashboard and `wrangler tail`
# instead of being silently swallowed (see the "paid but shows FREE" incident).
# Keep this table LAST: in TOML every key after a [table] header belongs to that
# table, so top-level keys like `routes` must appear above it.
[observability]
enabled = true
